apiVersion: swgi.io/v1alpha1
kind: SwgiDeployment
metadata:
  name: axis-swgi-api
  namespace: swgi-system
spec:
  image: registry.connect.redhat.com/axissystems/swgi-core:0.1.0
  replicas: 1
  port: 8080
  swgiMode: production
  logLevel: INFO
  logFormat: json
  orgId: org-prod
  nodeId: fen-ocp-001
  policyPath: /opt/app-root/src/axis-swgi-api/data/input/policy.json
  receiptStoreBackend: sqlite
  receiptDbPath: /tmp/swgi/receipts.db
  dbConnectTimeoutSeconds: 5
  runDbMigrations: true
  tlsEnabled: false
  metricsEnabled: true
  serviceAccountName: default
  tokens:
    admin: change-admin-token
    viewer: change-viewer-token
  signingKey:
    pem: |
      -----BEGIN PRIVATE KEY-----
      REPLACE_WITH_REAL_ED25519_PRIVATE_KEY
      -----END PRIVATE KEY-----
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

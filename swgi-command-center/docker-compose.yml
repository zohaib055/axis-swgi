services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: swgi
      POSTGRES_PASSWORD: swgi
      POSTGRES_DB: swgi_command_center
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U swgi -d swgi_command_center"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - swgi_command_center_pg:/var/lib/postgresql/data

  command-center:
    build:
      context: ..
      dockerfile: swgi-command-center/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      HOST: 0.0.0.0
      PORT: 8081
      SWGI_MODE: production
      SWGI_ORG_ID: org-prod
      SWGI_COMMAND_CENTER_ID: cc-local-001
      COMMAND_CENTER_URL: http://localhost:8081
      POLICY_PATH: ./data/input/policy.json
      SIGNING_KEY_PATH: ./data/input/signing_key_ed25519.pem
      DATABASE_URL: postgresql://swgi:swgi@postgres:5432/swgi_command_center
      RUN_DB_MIGRATIONS: "true"
      ADMIN_API_TOKEN: local-admin-token-change-me
      VIEWER_API_TOKEN: local-viewer-token-change-me
      API_KEY_HASH_SECRET: local-dev-random-secret-change-me
      RATE_LIMIT_PER_MINUTE: "120"
    ports:
      - "8081:8081"
    volumes:
      - ./data/input/signing_key_ed25519.pem:/app/swgi-command-center/data/input/signing_key_ed25519.pem:ro

volumes:
  swgi_command_center_pg:

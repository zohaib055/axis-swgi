# Google Cloud Marketplace deployer schema for SWGI.
# The final deployer image must copy this file to /data/schema.yaml.
x-google-marketplace:
  schemaVersion: v2
  applicationApiVersion: app.k8s.io/v1beta1
  publishedVersion: "0.1.0"
  publishedVersionMetadata:
    releaseNote: "Initial SWGI customer tenant deployment scaffold."

properties:
  name:
    type: string
    title: Application name
    default: swgi
    x-google-marketplace:
      type: NAME

  namespace:
    type: string
    title: Namespace
    default: swgi-system
    x-google-marketplace:
      type: NAMESPACE

  commandCenterUrl:
    type: string
    title: Command Center URL
    description: HTTPS URL for the Axis Systems managed SWGI Command Center.

  orgId:
    type: string
    title: Organization ID
    description: Command Center organization identifier.

  clusterId:
    type: string
    title: Cluster ID
    description: Command Center cluster identifier for this customer cluster.

  operatorToken:
    type: string
    title: Operator token
    description: Cluster-scoped token generated by Command Center.
    x-google-marketplace:
      type: STRING

  publicSigningKeyPem:
    type: string
    title: Public signing key PEM
    description: Public key used by the Operator to verify Trust Receipts.
    x-google-marketplace:
      type: STRING

  operatorImage:
    type: string
    title: SWGI Operator image
    description: Marketplace Artifact Registry image for the SWGI Operator.

  enforcementImage:
    type: string
    title: SWGI enforcement image
    description: Marketplace Artifact Registry image for SWGI enforcement pods.

  receiptArchiveBucket:
    type: string
    title: Receipt archive bucket
    description: Optional customer-owned Cloud Storage bucket for receipt archive.
    default: ""

  enableCloudLogging:
    type: boolean
    title: Enable Cloud Logging
    default: true

  enableCloudMonitoring:
    type: boolean
    title: Enable Cloud Monitoring
    default: true

required:
  - name
  - namespace
  - commandCenterUrl
  - orgId
  - clusterId
  - operatorToken
  - publicSigningKeyPem
  - operatorImage
  - enforcementImage

apiVersion: v1
kind: Secret
metadata:
  name: ${APP_NAME}-operator
  namespace: ${NAMESPACE}
  labels:
    app.kubernetes.io/name: swgi
    app.kubernetes.io/instance: ${APP_NAME}
    app.kubernetes.io/part-of: swgi
type: Opaque
stringData:
  OPERATOR_TOKEN: ${OPERATOR_TOKEN}
  PUBLIC_SIGNING_KEY_PEM: ${PUBLIC_SIGNING_KEY_PEM}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ${APP_NAME}-operator
  namespace: ${NAMESPACE}
  labels:
    app.kubernetes.io/name: swgi
    app.kubernetes.io/instance: ${APP_NAME}
    app.kubernetes.io/part-of: swgi
data:
  COMMAND_CENTER_URL: ${COMMAND_CENTER_URL}
  ORG_ID: ${ORG_ID}
  CLUSTER_ID: ${CLUSTER_ID}
  RECEIPT_ARCHIVE_BUCKET: ${RECEIPT_ARCHIVE_BUCKET}
  ENABLE_CLOUD_LOGGING: ${ENABLE_CLOUD_LOGGING}
  ENABLE_CLOUD_MONITORING: ${ENABLE_CLOUD_MONITORING}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ${APP_NAME}-operator
  namespace: ${NAMESPACE}
  labels:
    app.kubernetes.io/name: swgi
    app.kubernetes.io/instance: ${APP_NAME}
    app.kubernetes.io/part-of: swgi
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ${APP_NAME}-operator
  namespace: ${NAMESPACE}
  labels:
    app.kubernetes.io/name: swgi
    app.kubernetes.io/instance: ${APP_NAME}
    app.kubernetes.io/part-of: swgi
rules:
  - apiGroups: [""]
    resources: ["configmaps", "pods", "services", "secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ${APP_NAME}-operator
  namespace: ${NAMESPACE}
  labels:
    app.kubernetes.io/name: swgi
    app.kubernetes.io/instance: ${APP_NAME}
    app.kubernetes.io/part-of: swgi
subjects:
  - kind: ServiceAccount
    name: ${APP_NAME}-operator
    namespace: ${NAMESPACE}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ${APP_NAME}-operator
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${APP_NAME}-operator
  namespace: ${NAMESPACE}
  labels:
    app.kubernetes.io/name: swgi-operator
    app.kubernetes.io/instance: ${APP_NAME}
    app.kubernetes.io/part-of: swgi
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: swgi-operator
      app.kubernetes.io/instance: ${APP_NAME}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: swgi-operator
        app.kubernetes.io/instance: ${APP_NAME}
        app.kubernetes.io/part-of: swgi
    spec:
      serviceAccountName: ${APP_NAME}-operator
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: operator
          image: ${OPERATOR_IMAGE}
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: ${APP_NAME}-operator
            - secretRef:
                name: ${APP_NAME}-operator
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            runAsNonRoot: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${APP_NAME}-enforcement
  namespace: ${NAMESPACE}
  labels:
    app.kubernetes.io/name: swgi-enforcement
    app.kubernetes.io/instance: ${APP_NAME}
    app.kubernetes.io/part-of: swgi
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: swgi-enforcement
      app.kubernetes.io/instance: ${APP_NAME}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: swgi-enforcement
        app.kubernetes.io/instance: ${APP_NAME}
        app.kubernetes.io/part-of: swgi
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: enforcement
          image: ${ENFORCEMENT_IMAGE}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: ${APP_NAME}-operator
            - secretRef:
                name: ${APP_NAME}-operator
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            runAsNonRoot: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: ${APP_NAME}-enforcement
  namespace: ${NAMESPACE}
  labels:
    app.kubernetes.io/name: swgi-enforcement
    app.kubernetes.io/instance: ${APP_NAME}
    app.kubernetes.io/part-of: swgi
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: swgi-enforcement
    app.kubernetes.io/instance: ${APP_NAME}
  ports:
    - name: http
      port: 8080
      targetPort: 8080
